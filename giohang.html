<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody's Sneaker - Giỏ Hàng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Itim&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-cart">

    <header class="cart-header">
        <div class="container cart-header-container">
            <div class="logo">
                <a href="index.html"><img src="image/brand.png" alt="Cody's Sneaker Logo"></a>
            </div>
            
            <h1 class="cart-title">GIỎ HÀNG</h1>
            
            <form class="cart-search-bar" action="#">
                <button type="submit"><i class="fas fa-search"></i></button>
                <input type="text" placeholder="Tìm trong giỏ hàng..." required>
            </form>
        </div>
    </header>

    <main class="container cart-main">
        
        <div class="cart-row cart-heading">
            <div class="cart-col-product">
                <input type="checkbox" id="check-all">
                <label for="check-all">Sản phẩm</label>
            </div>
            <div class="cart-col-price">Đơn giá</div>
            <div class="cart-col-quantity">Số lượng</div>
            <div class="cart-col-total">Số tiền</div>
            <div class="cart-col-action">Thao tác</div>
        </div>

        <div class="cart-items-list">
            
            <div class="cart-row cart-item">
                <div class="cart-col-product">
                    <input type="checkbox" class="item-check">
                    <img src="image/sneaker1.png" alt="Giày Nike Dunk Low" class="cart-img">
                    <span class="cart-name">Giày Nike Dunk Low 'Dark Sulfur' IB4417-101</span>
                </div>
                <div class="cart-col-price">2,899,000đ</div>
                <div class="cart-col-quantity">
                    <div class="qty-control">
                        <button class="qty-btn">-</button>
                        <input type="text" value="1" class="qty-input" readonly>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
                <div class="cart-col-total">2,899,000đ</div>
                <div class="cart-col-action">
                    <button class="btn-delete">Xóa</button>
                </div>
            </div>

            <div class="cart-row cart-item">
                <div class="cart-col-product">
                    <input type="checkbox" class="item-check">
                    <img src="image/sneaker2.png" alt="Giày Nike Air Jordan 1" class="cart-img">
                    <span class="cart-name">Giày Nike Air Jordan 1 Low Reverse Bred Leather 553558-606 Leather</span>
                </div>
                <div class="cart-col-price">2,720,000đ</div>
                <div class="cart-col-quantity">
                    <div class="qty-control">
                        <button class="qty-btn">-</button>
                        <input type="text" value="1" class="qty-input" readonly>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
                <div class="cart-col-total">2,720,000đ</div>
                <div class="cart-col-action">
                    <button class="btn-delete">Xóa</button>
                </div>
            </div>

            <div class="cart-row cart-item">
                <div class="cart-col-product">
                    <input type="checkbox" class="item-check">
                    <img src="image/sneaker3.png" alt="Giày Nike Air Jordan 1 Shattered" class="cart-img">
                    <span class="cart-name">Giày Nike Air Jordan 1 Low Shattered Backboard Alternate 553558-081 Leather</span>
                </div>
                <div class="cart-col-price">2,720,000đ</div>
                <div class="cart-col-quantity">
                    <div class="qty-control">
                        <button class="qty-btn">-</button>
                        <input type="text" value="1" class="qty-input" readonly>
                        <button class="qty-btn">+</button>
                    </div>
                </div>
                <div class="cart-col-total">2,720,000đ</div>
                <div class="cart-col-action">
                    <button class="btn-delete">Xóa</button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
