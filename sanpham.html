<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody's Sneaker - Tất Cả Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Itim&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-sanpham"> 
    <header>
        <div class="container header-container">
            <div class="logo">
                <a href="index.html"><img src="image/brand.png" alt="Cody's Sneaker Logo"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="sanpham.html">Sản phẩm</a></li>
                    <li><a href="#">Sale</a></li>
                    <li><a href="#">Về chúng tôi</a></li>
                    <li><a href="#">Chăm sóc khách hàng</a></li>
                    <li><a href="#">Phương thức thanh toán</a></li>
                </ul>
            </nav>
            <div class="header-right">
                <form class="search-bar" action="#">
                    <input type="text" placeholder="Tìm kiếm sản phẩm..." required>
                    <button type="submit"><i class="fas fa-search"></i></button>
                </form>
                <div class="header-icons">
                    <div class="logo1">
                        <a href="giohang.html"><img src="image/giohang.png" alt="Giỏ hàng"></a>
                    </div>
                    <a href="#" class="user-icon"><i class="fas fa-user"></i></a>
                </div>
            </div>
        </div>
    </header>

    <main class="container shop-container">
        
        <div class="breadcrumb">
            <p>Trang chủ / Giày Nike</p>
        </div>

        <div class="shop-layout">
            <aside class="sidebar">
                <div class="filter-box">
                    <h3 class="filter-title">THƯƠNG HIỆU</h3>
                    <div class="filter-content grid-2-col">
                        <label><input type="checkbox" name="brand" value="nike"> Nike</label>
                        <label><input type="checkbox" name="brand" value="adidas"> Adidas</label>
                        <label><input type="checkbox" name="brand" value="dior"> Dior</label>
                        <label><input type="checkbox" name="brand" value="jordan"> Air Jordan</label>
                    </div>
                </div>

                <div class="filter-box">
                    <h3 class="filter-title">LỌC GIÁ</h3>
                    <div class="filter-content filter-list">
                        <label><input type="checkbox" name="price"> Dưới 200,000đ</label>
                        <label><input type="checkbox" name="price"> 200,000đ - 400,000đ</label>
                        <label><input type="checkbox" name="price"> 400,000đ - 1,000,000đ</label>
                        <label><input type="checkbox" name="price"> Trên 1,000,000đ</label>
                    </div>
                </div>

                <div class="filter-box">
                    <h3 class="filter-title">KÍCH CỠ</h3>
                    <div class="filter-content grid-4-col">
                        <label><input type="checkbox" name="size"> 35</label>
                        <label><input type="checkbox" name="size"> 36</label>
                        <label><input type="checkbox" name="size"> 37</label>
                        <label><input type="checkbox" name="size"> 38</label>
                        <label><input type="checkbox" name="size"> 39</label>
                        <label><input type="checkbox" name="size"> 40</label>
                        <label><input type="checkbox" name="size"> 41</label>
                        <label><input type="checkbox" name="size"> 42</label>
                        <label><input type="checkbox" name="size"> 43</label>
                        <label><input type="checkbox" name="size"> 44</label>
                        <label><input type="checkbox" name="size"> 45</label>
                        <label><input type="checkbox" name="size"> 46</label>
                    </div>
                </div>
            </aside>

            <section class="products-area">
                <div class="products-header">
                    <h1>TẤT CẢ SẢN PHẨM</h1>
                    <div class="sort-options">
                        <span>SẮP XẾP:</span>
                        <select>
                            <option>Sản phẩm nổi bật</option>
                            <option>Giá tăng dần</option>
                            <option>Giá giảm dần</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid-5">
                    
                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker4.png" alt="Mô tả giày 4">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker5.png" alt="Mô tả giày 5">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker6.png" alt="Mô tả giày 6">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker7.png" alt="Mô tả giày 7">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker8.png" alt="Mô tả giày 8">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker9.png" alt="Mô tả giày 9">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker10.png" alt="Mô tả giày 10">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker11.png" alt="Mô tả giày 11">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker12.png" alt="Mô tả giày 12">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker13.png" alt="Mô tả giày 13">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker14.png" alt="Mô tả giày 14">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker15.png" alt="Mô tả giày 15">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker16.png" alt="Mô tả giày 16">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker17.png" alt="Mô tả giày 17">
                        </div>
                    </div>

                    <div class="product-card">
                        <div class="product-image">
                            <img src="image/sneaker18.png" alt="Mô tả giày 18">
                        </div>
                    </div>

                </div>            
            </section>
        </div>
    </main>

</body>
</html>
